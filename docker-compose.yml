version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: onyxcode_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onyxcode_api
    environment:
      - APP_ENV=${APP_ENV}
      - APP_HOST=${APP_HOST}
      - APP_PORT=${APP_PORT}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL}
      - API_MAX_CONCURRENT_REQUESTS=${API_MAX_CONCURRENT_REQUESTS}
      - API_REQUEST_TIMEOUT_SECONDS=${API_REQUEST_TIMEOUT_SECONDS}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP}
      - RATE_LIMIT_PER_RUT=${RATE_LIMIT_PER_RUT}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS}
      - UTM_API_URL=${UTM_API_URL}
      - UTM_CACHE_TTL_SECONDS=${UTM_CACHE_TTL_SECONDS}
      - UTM_REQUEST_TIMEOUT_SECONDS=${UTM_REQUEST_TIMEOUT_SECONDS}
      - DATABASE_URL=${DATABASE_URL}
      - DB_STATEMENT_TIMEOUT_MS=${DB_STATEMENT_TIMEOUT_MS}
      - DB_IDLE_IN_TRANSACTION_TIMEOUT_MS=${DB_IDLE_IN_TRANSACTION_TIMEOUT_MS}
      - DB_POOL_SIZE=${DB_POOL_SIZE}
      - DB_POOL_MAX_OVERFLOW=${DB_POOL_MAX_OVERFLOW}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${APP_PORT:-8000}/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
